# DailyTracker - iOS build for Codemagic
# Xcode の Bundle ID（com.ryomawasabi.dailytracker）に合わせてあります。

workflows:
  # 署名なし・シミュレータ用（まずはこれでビルドが通るか確認）
  ios-simulator:
    name: DailyTracker iOS (Simulator)
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_PROJECT: "DailyTracker.xcodeproj"
        XCODE_SCHEME: "DailyTracker"
    scripts:
      - name: Build for Simulator
        script: |
          xcodebuild build \
            -project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

  # TestFlight / 実機用（自動コード署名）
  ios-dailytracker:
    name: DailyTracker iOS (IPA / TestFlight)
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      vars:
        XCODE_PROJECT: "DailyTracker.xcodeproj"
        XCODE_SCHEME: "DailyTracker"
        APP_STORE_CONNECT_APP_ID: "6760403155"
    scripts:
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "com.ryomawasabi.dailytracker" \
            --type IOS_APP_STORE \
            --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - "App Store Connect Users"
